<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hephaestus · Phrase Forge</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0c12; font-family: monospace; padding: 2rem; color: #d4e0ed; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { color: #e07040; margin-bottom: 0.5rem; }
        .sub { color: #6a7a8a; margin-bottom: 2rem; border-bottom: 1px solid #1e2535; padding-bottom: 0.5rem; }
        .panel { background: #0b0e16; border: 1px solid #1e2535; border-radius: 0.5rem; padding: 1.5rem; margin-bottom: 2rem; }
        button { background: #1e2535; border: none; color: #d4e0ed; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; }
        button:hover { background: #e07040; }
        .phrase-card { background: #0f141e; border: 1px solid #1e2535; border-radius: 0.5rem; padding: 1rem; margin-bottom: 1rem; }
        .phrase-text { font-size: 1rem; margin-bottom: 0.5rem; color: #e0e2ed; }
        .phrase-score { color: #e07040; font-size: 0.7rem; }
        .log-area { background: #060810; border: 1px solid #1e2535; border-radius: 0.5rem; padding: 1rem; max-height: 200px; overflow-y: auto; font-size: 0.75rem; }
        .log-entry { padding: 0.25rem 0; border-bottom: 1px solid #1a1f2a; color: #6a7a8a; }
        .log-entry.success { color: #6b8e23; }
        .stats { display: flex; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
        .stat-badge { background: #1a1f2a; padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.7rem; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="container">
    <h1>🔥 Hephaestus · Phrase Forge</h1>
    <div class="sub">Generating meaningful phrases from quality words</div>

    <div class="panel">
        <button id="forgeBtn">⚒️ Forge Phrases</button>
        <div id="stats" class="stats" style="margin-top: 1rem;"></div>
        <div id="phraseContainer" style="margin-top: 1rem;"></div>
    </div>

    <div class="panel">
        <h2>📋 Log</h2>
        <div id="logArea" class="log-area"><div class="log-entry">Ready.</div></div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://kzcucjcyxybypncbdbws.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_saeUHGocDah-T2_709M6Fg_g26JtLXw';
    let supabase;

    const PATTERNS = [
        { template: "{noun} {verb}", type: "nv" },
        { template: "{adj} {noun}", type: "adjn" },
        { template: "{noun} of {noun}", type: "non" },
        { template: "{noun} {verb} {noun}", type: "nvn" },
        { template: "{verb} the {noun}", type: "vtn" },
        { template: "The {adj} {noun}", type: "theadjn" }
    ];

    function addLog(msg, type = 'info') {
        const log = document.getElementById('logArea');
        const entry = document.createElement('div');
        entry.className = `log-entry ${type}`;
        entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        log.appendChild(entry);
        entry.scrollIntoView({ behavior: 'smooth' });
    }

    async function loadWords() {
        const { data, error } = await supabase
            .from('hermes_entries')
            .select('body, word_type, trending_score')
            .eq('trending_score', 73)
            .or('body.in.(claude,agent,openai,codex,source,skill,html,code,prompts,principles,prototype,agents,coding)');
            // .gt('trending_score', 40);

        if (error) {
            addLog(`Error loading words: ${error.message}`, 'error');
            return { nouns: [], verbs: [], adjs: [] };
        }

        const nouns = data.filter(w => w.word_type === 'noun');
        const verbs = data.filter(w => w.word_type === 'verb');
        const adjs = data.filter(w => w.word_type === 'adj');

        document.getElementById('stats').innerHTML = `
            <span class="stat-badge">📚 Nouns: ${nouns.length}</span>
            <span class="stat-badge">⚡ Verbs: ${verbs.length}</span>
            <span class="stat-badge">🎨 Adjectives: ${adjs.length}</span>
        `;

        return { nouns, verbs, adjs };
    }

    async function forgePhrases() {
        addLog('🔥 Forging phrases...', 'info');
        
        const { nouns, verbs, adjs } = await loadWords();
        
        if (nouns.length < 2) {
            addLog('Not enough nouns. Run Hermes first.', 'warning');
            return;
        }

        const phrases = [];
        const usedCombos = new Set();

        for (let i = 0; i < 15; i++) {
            const pattern = PATTERNS[Math.floor(Math.random() * PATTERNS.length)];
            
            const noun1 = nouns[Math.floor(Math.random() * nouns.length)];
            const noun2 = nouns.length > 1 ? nouns[Math.floor(Math.random() * nouns.length)] : noun1;
            const verb = verbs.length ? verbs[Math.floor(Math.random() * verbs.length)] : nouns[0];
            const adj = adjs.length ? adjs[Math.floor(Math.random() * adjs.length)] : nouns[0];
            
            let phrase = pattern.template;
            phrase = phrase.replace('{noun}', noun1.body);
            phrase = phrase.replace(/{noun}/g, (match, offset) => {
                return offset === phrase.lastIndexOf('{noun}') ? noun2.body : noun1.body;
            });
            phrase = phrase.replace('{verb}', verb.body);
            phrase = phrase.replace('{adj}', adj.body);
            phrase = phrase.charAt(0).toUpperCase() + phrase.slice(1);
            
            const comboKey = `${noun1.body}_${verb.body}_${noun2.body}`;
            if (usedCombos.has(comboKey)) continue;
            usedCombos.add(comboKey);
            
            const score = Math.min(100, Math.round((noun1.trending_score + verb.trending_score + noun2.trending_score) / 3));
            phrases.push({ phrase, score });
        }

        displayPhrases(phrases);
        addLog(`✨ Forged ${phrases.length} phrases`, 'success');
    }

    function displayPhrases(phrases) {
        const container = document.getElementById('phraseContainer');
        if (!phrases.length) {
            container.innerHTML = '<div class="log-entry">No phrases generated.</div>';
            return;
        }
        container.innerHTML = phrases.map(p => `
            <div class="phrase-card">
                <div class="phrase-text">${escapeHtml(p.phrase)}</div>
                <div class="phrase-score">✨ ${p.score}%</div>
            </div>
        `).join('');
    }

    function escapeHtml(str) { return String(str).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])); }

    document.getElementById('forgeBtn').addEventListener('click', forgePhrases);

    async function init() {
        if (!window.supabase) return;
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        addLog('🔥 Hephaestus ready. Forging phrases from quality seeds.', 'success');
        await loadWords();
    }
    init();
</script>
</body>
</html>
