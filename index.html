<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 Hephaestus · Two-Stage Builder</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0c12; font-family: 'Courier New', monospace; padding: 2rem; color: #d4e0ed; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { border-left: 4px solid #e07040; padding-left: 1rem; margin-bottom: 2rem; }
        h1 { font-size: 2rem; color: #e07040; }
        .sub { color: #6a7a8a; font-size: 0.8rem; }
        .panel { background: #0b0e16; border: 1px solid #1e2535; border-radius: 0.5rem; padding: 1.5rem; margin-bottom: 1.5rem; }
        .panel-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: #6a7a8a; margin-bottom: 1rem; }
        button { background: #1e2535; border: none; color: #d4e0ed; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; margin-right: 0.5rem; }
        button:hover { background: #e07040; color: #0a0c12; }
        button.primary { background: #e07040; color: #0a0c12; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: #0f141e; border: 1px solid #1e2535; border-radius: 0.5rem; padding: 0.75rem; text-align: center; }
        .stat-number { font-size: 1.5rem; font-weight: bold; color: #e07040; }
        .stat-label { font-size: 0.7rem; color: #6a7a8a; }
        .log-area { background: #060810; border: 1px solid #1e2535; border-radius: 0.5rem; padding: 1rem; max-height: 300px; overflow-y: auto; font-size: 0.75rem; }
        .log-entry { padding: 0.25rem 0; border-bottom: 1px solid #1a1f2a; color: #6a7a8a; }
        .log-entry.success { color: #6b8e23; }
        .log-entry.error { color: #cd5c5c; }
        .status-step { padding: 0.25rem 0; border-left: 2px solid #1e2535; padding-left: 0.75rem; margin: 0.25rem 0; font-size: 0.75rem; }
        .status-step.complete { border-left-color: #6b8e23; color: #6b8e23; }
        .status-step.running { border-left-color: #e07040; color: #e07040; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🔥 HEPHAESTUS · TWO-STAGE BUILDER</h1>
        <div class="sub">Stage 1: Reflexes → Crafts (4-8 words) | Stage 2: Crafts → Constructs (9-15 words)</div>
    </div>

    <div class="stats-grid" id="statsGrid"></div>

    <div class="panel">
        <div class="panel-title">🏭 BUILD PIPELINE</div>
        <button id="runHermesBtn" class="primary">⚡ Stage 0: Scrape Hermes Reflexes</button>
        <button id="stage1Btn" class="primary">🔥 Stage 1: Forge Crafts (4-8 words)</button>
        <button id="stage2Btn" class="primary">🔨 Stage 2: Forge Constructs → Demeter (9-15 words)</button>
        <button id="runAllBtn">🏭 Run Full Pipeline</button>
        <button id="clearBtn">🗑️ Clear Hephaestus & Demeter</button>
        
        <div id="status" style="margin-top: 1rem;">
            <div class="status-step pending">⚡ Hermes Reflexes: Waiting</div>
            <div class="status-step pending">🔥 Stage 1 Crafts: Waiting</div>
            <div class="status-step pending">🔨 Stage 2 Constructs: Waiting</div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title">📋 LOG</div>
        <div id="ingestLog" class="log-area">
            <div class="log-entry">🔥 Hephaestus ready. Run pipeline to build concepts.</div>
        </div>
    </div>
</div>

<script>
    (function() {
        const SUPABASE_URL = 'https://kzcucjcyxybypncbdbws.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_saeUHGocDah-T2_709M6Fg_g26JtLXw';
        let supabase = null;

        function addLog(msg, type = 'info') {
            const log = document.getElementById('ingestLog');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            log.appendChild(entry);
            entry.scrollIntoView({ behavior: 'smooth' });
        }

        function updateStatus(step, status) {
            const steps = { hermes: 0, stage1: 1, stage2: 2 };
            const icons = { hermes: '⚡', stage1: '🔥', stage2: '🔨' };
            const names = { hermes: 'Hermes Reflexes', stage1: 'Stage 1 Crafts', stage2: 'Stage 2 Constructs' };
            const statusClass = status === 'complete' ? 'complete' : status === 'running' ? 'running' : 'pending';
            const statusText = status === 'complete' ? 'Complete' : status === 'running' ? 'Running...' : 'Waiting';
            
            const divs = document.querySelectorAll('.status-step');
            if (divs[steps[step]]) {
                divs[steps[step]].className = `status-step ${statusClass}`;
                divs[steps[step]].innerHTML = `${icons[step]} ${names[step]}: ${statusText}`;
            }
        }

        async function updateStats() {
            const { count: reflexes } = await supabase.from('concepts').select('*', { count: 'exact', head: true }).eq('band', 'hermes');
            const { count: crafts } = await supabase.from('concepts').select('*', { count: 'exact', head: true }).eq('band', 'hephaestus');
            const { count: constructs } = await supabase.from('concepts').select('*', { count: 'exact', head: true }).eq('band', 'demeter');
            
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card"><div class="stat-number">${reflexes || 0}</div><div class="stat-label">Hermes Reflexes (1-3)</div></div>
                <div class="stat-card"><div class="stat-number">${crafts || 0}</div><div class="stat-label">Hephaestus Crafts (4-8)</div></div>
                <div class="stat-card"><div class="stat-number">${constructs || 0}</div><div class="stat-label">Demeter Constructs (9-15)</div></div>
            `;
        }

        // ============================================
        // STAGE 0: HERMES SCRAPE
        // ============================================
        async function runHermes() {
            addLog('⚡ Scraping Hermes reflexes...', 'info');
            updateStatus('hermes', 'running');
            
            const STOPWORDS = new Set(['the','and','for','with','this','that','from','have','are','was','were','how','why','what','when','where','who','which','there','their','they','them','then','than','about','into','through','during','before','after','above','below','between','under','very','just','but','not','you','your','our','its','has','had','been','being','can','will','would','could','should','might','like','because','after','while','since']);
            const PRIORITY = new Set(['ai','ml','api','data','cloud','native','scalable','async','pipeline','workflow','automation','frontier','alignment','resonance','collapse','emergence','paradox','recursion','entropy','fractal','quantum','neural','vector','embedding','inference','latency','throughput','semantic','intelligence']);
            
            function extractTokens(text) {
                return text.toLowerCase().replace(/[^a-z\s]/g, '').split(/\s+/).filter(w => w.length >= 4 && w.length <= 12 && !STOPWORDS.has(w));
            }
            function scoreWord(word, freq) {
                let s = Math.min(80, freq * 6);
                if (PRIORITY.has(word)) s += 30;
                if (word.length >= 6 && word.length <= 10) s += 10;
                return Math.min(100, s);
            }
            
            async function fetchReddit() {
                try {
                    const res = await fetch('https://www.reddit.com/r/all/top.json?limit=50&t=day');
                    const data = await res.json();
                    const tokens = data.data.children.map(c => c.data.title).flatMap(t => extractTokens(t));
                    const freq = new Map(); tokens.forEach(t => freq.set(t, (freq.get(t)||0)+1));
                    return Array.from(freq.entries()).sort((a,b)=>b[1]-a[1]).slice(0,15).map(([w,c]) => ({body:w, source:'reddit', score:scoreWord(w,c)}));
                } catch(e) { return []; }
            }
            async function fetchHN() {
                try {
                    const ids = await fetch('https://hacker-news.firebaseio.com/v0/topstories.json').then(r=>r.json());
                    const stories = await Promise.all(ids.slice(0,30).map(async id => fetch(`https://hacker-news.firebaseio.com/v0/item/${id}.json`).then(r=>r.json())));
                    const tokens = stories.filter(s=>s&&s.title).map(s=>s.title).flatMap(t=>extractTokens(t));
                    const freq = new Map(); tokens.forEach(t=>freq.set(t,(freq.get(t)||0)+1));
                    return Array.from(freq.entries()).sort((a,b)=>b[1]-a[1]).slice(0,15).map(([w,c])=>({body:w, source:'hn', score:scoreWord(w,c)}));
                } catch(e) { return []; }
            }
            async function fetchGitHub() {
                try {
                    const date = new Date(); date.setDate(date.getDate()-7);
                    const res = await fetch(`https://api.github.com/search/repositories?q=created:>${date.toISOString().split('T')[0]}&sort=stars&order=desc&per_page=30`);
                    const data = await res.json();
                    const texts = data.items.flatMap(item=>[item.name, item.description].filter(Boolean));
                    const tokens = texts.flatMap(t=>extractTokens(t));
                    const freq = new Map(); tokens.forEach(t=>freq.set(t,(freq.get(t)||0)+1));
                    let items = Array.from(freq.entries()).sort((a,b)=>b[1]-a[1]).slice(0,15);
                    if(items.length===0) items=[['api',1],['data',1],['cloud',1],['native',1],['scalable',1],['async',1]].map(([w,c])=>[w,c]);
                    return items.map(([w,c])=>({body:w, source:'github', score:scoreWord(w,c)+15}));
                } catch(e) { return []; }
            }
            
            const [reddit, hn, github] = await Promise.all([fetchReddit(), fetchHN(), fetchGitHub()]);
            let saved = 0;
            for (const c of [...reddit, ...hn, ...github]) {
                const wc = c.body.split(/\s+/).length;
                if(wc >= 1 && wc <= 3){
                    const exp = new Date(); exp.setDate(exp.getDate()+3);
                    const { error } = await supabase.from('concepts').insert({
                        body: c.body.toLowerCase(), band: 'hermes', source: c.source, score: c.score,
                        word_type: 'noun', metadata: {word_count: wc}, expires_at: exp.toISOString(), created_at: new Date().toISOString(),
                        generation: 1, parent_ids: [], mutation_count: 0
                    });
                    if(!error) saved++;
                }
            }
            addLog(`✅ Hermes: ${saved} reflexes`, saved>0?'success':'warning');
            updateStatus('hermes', 'complete');
            await updateStats();
            return saved;
        }

        // ============================================
        // STAGE 1: Combine reflexes → crafts (4-8 words)
        // ============================================
        async function runStage1() {
            addLog('🔥 Stage 1: Forging crafts from reflexes...', 'info');
            updateStatus('stage1', 'running');
            
            const { data: reflexes } = await supabase
                .from('concepts')
                .select('id, body, score, generation')
                .eq('band', 'hermes')
                .order('score', { ascending: false })
                .limit(30);
            
            if (!reflexes || reflexes.length < 2) {
                addLog('⚠️ Need at least 2 reflexes', 'warning');
                updateStatus('stage1', 'complete');
                return 0;
            }
            
            const patterns = [
                (a,b) => `${a} ${b}`,
                (a,b) => `${a} and ${b}`,
                (a,b) => `the ${a} ${b}`,
                (a,b) => `${a} of ${b}`,
                (a,b) => `when ${a} ${b}`,
                (a,b) => `${a} emerges from ${b}`,
                (a,b) => `through ${a}, ${b}`,
                (a,b) => `${a} becomes ${b}`
            ];
            
            let saved = 0;
            const used = new Set();
            
            for (let i = 0; i < 20; i++) {
                const a = reflexes[Math.floor(Math.random() * reflexes.length)];
                const b = reflexes[Math.floor(Math.random() * reflexes.length)];
                const pattern = patterns[Math.floor(Math.random() * patterns.length)];
                let craft = pattern(a.body, b.body);
                const wordCount = craft.split(/\s+/).length;
                
                if (wordCount >= 4 && wordCount <= 8 && !used.has(craft)) {
                    used.add(craft);
                    const exp = new Date(); exp.setDate(exp.getDate() + 7);
                    const avgScore = Math.round((a.score + b.score) / 2) + 5;
                    
                    const { error } = await supabase.from('concepts').insert({
                        body: craft.toLowerCase(),
                        band: 'hephaestus',
                        source: 'forge',
                        score: Math.min(100, avgScore),
                        word_type: 'craft',
                        metadata: { word_count: wordCount, pattern_used: pattern },
                        expires_at: exp.toISOString(),
                        created_at: new Date().toISOString(),
                        generation: Math.max(a.generation, b.generation) + 1,
                        parent_ids: [a.id, b.id],
                        mutation_count: 0
                    });
                    if (!error) saved++;
                }
            }
            
            addLog(`✅ Stage 1: ${saved} crafts forged`, saved > 0 ? 'success' : 'warning');
            updateStatus('stage1', 'complete');
            await updateStats();
            return saved;
        }

        // ============================================
        // STAGE 2: Combine crafts → constructs (9-15 words)
        // Writes directly to band='demeter'
        // ============================================
        async function runStage2() {
            addLog('🔨 Stage 2: Forging constructs from crafts → Demeter...', 'info');
            updateStatus('stage2', 'running');
            
            const { data: crafts } = await supabase
                .from('concepts')
                .select('id, body, score, generation')
                .eq('band', 'hephaestus')
                .order('score', { ascending: false })
                .limit(30);
            
            if (!crafts || crafts.length < 2) {
                addLog('⚠️ Need at least 2 crafts', 'warning');
                updateStatus('stage2', 'complete');
                return 0;
            }
            
            const templates = [
                (a, b) => `${a} ${b} This combination reveals new structure.`,
                (a, b) => `When ${a} and ${b} merge, a deeper pattern emerges.`,
                (a, b) => `Through ${a}, ${b} transforms into higher order.`,
                (a, b) => `${a} flows into ${b}, creating accumulated context.`,
                (a, b) => `The synthesis of ${a} and ${b} grounds new understanding.`,
                (a, b) => `${a} resonates with ${b}, forming a coherent field.`,
                (a, b) => `As ${a} integrates with ${b}, the construct stabilizes.`
            ];
            
            let saved = 0;
            const used = new Set();
            
            for (let i = 0; i < 15; i++) {
                const a = crafts[Math.floor(Math.random() * crafts.length)];
                const b = crafts[Math.floor(Math.random() * crafts.length)];
                const template = templates[Math.floor(Math.random() * templates.length)];
                let construct = template(a.body, b.body);
                construct = construct.charAt(0).toUpperCase() + construct.slice(1);
                const wordCount = construct.split(/\s+/).length;
                
                if (wordCount >= 9 && wordCount <= 15 && !used.has(construct)) {
                    used.add(construct);
                    const exp = new Date(); exp.setDate(exp.getDate() + 14);
                    const avgScore = Math.round((a.score + b.score) / 2) + 10;
                    
                    const { error } = await supabase.from('concepts').insert({
                        body: construct.toLowerCase(),
                        band: 'demeter',  // ← DIRECT TO DEMETER
                        source: 'construct',
                        score: Math.min(100, avgScore),
                        word_type: 'construct',
                        metadata: { word_count: wordCount, template_used: template },
                        expires_at: exp.toISOString(),
                        created_at: new Date().toISOString(),
                        generation: Math.max(a.generation, b.generation) + 1,
                        parent_ids: [a.id, b.id],
                        mutation_count: 0
                    });
                    if (!error) saved++;
                }
            }
            
            addLog(`✅ Stage 2: ${saved} constructs sent to Demeter band`, saved > 0 ? 'success' : 'warning');
            updateStatus('stage2', 'complete');
            await updateStats();
            return saved;
        }

        async function runFullPipeline() {
            addLog('🏭 Running full build pipeline...', 'info');
            await runHermes();
            await runStage1();
            await runStage2();
            addLog('🏭 Pipeline complete!', 'success');
        }

        async function clearData() {
            await supabase.from('concepts').delete().in('band', ['hephaestus', 'demeter']);
            addLog('🗑️ Cleared Hephaestus and Demeter bands', 'success');
            await updateStats();
        }

        async function init() {
            if (!window.supabase) { addLog('Supabase failed to load', 'error'); return; }
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            await updateStats();
            
            document.getElementById('runHermesBtn').onclick = runHermes;
            document.getElementById('stage1Btn').onclick = runStage1;
            document.getElementById('stage2Btn').onclick = runStage2;
            document.getElementById('runAllBtn').onclick = runFullPipeline;
            document.getElementById('clearBtn').onclick = clearData;
            
            addLog('🔥 Hephaestus ready. Run pipeline to build concepts.', 'success');
        }
        
        init();
    })();
</script>
</body>
</html>
