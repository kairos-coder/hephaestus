<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔨 Hephaestus · Image Forge</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&family=JetBrains+Mono:wght@300;400;500&display=swap');
        :root {
            --void: #08080c; --deep: #100f14; --surface: #1a1820; --ember: #2a2018;
            --forge: #c07040; --forge-bright: #e08850; --iron: #8a6a50; --slag: #4a3830;
            --molten: #ff9940; --cooling: #604030; --anvil: #3a3a40; --spark: #ffcc80;
            --gold: #c8943a; --mist: #8a8080; --pale: #d4c8c0;
            --completed: #5a9060; --fire: #e04020;
            --font-display: 'Cinzel', serif; --font-body: 'Crimson Pro', serif; --font-mono: 'JetBrains Mono', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--void); font-family: var(--font-body); color: var(--pale); 
            min-height: 100vh; background-image: 
                radial-gradient(ellipse 50% 30% at 50% 0%, rgba(192,112,64,0.06) 0%, transparent 60%),
                repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,255,255,0.003) 3px, rgba(255,255,255,0.003) 4px);
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }

        .header { text-align: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--ember); }
        .header h1 { font-family: var(--font-display); font-size: 2.4rem; color: var(--forge-bright); letter-spacing: 4px; }
        .header-sub { font-family: var(--font-mono); font-size: 0.55rem; color: var(--mist); letter-spacing: 3px; margin-top: 0.3rem; }
        .anvil-icon { font-size: 3rem; margin-bottom: 0.5rem; animation: pound 2s ease-in-out infinite; }
        @keyframes pound { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); filter: brightness(1.3); } }

        .status-bar { display: flex; gap: 2rem; justify-content: center; margin-bottom: 1.5rem; font-family: var(--font-mono); font-size: 0.55rem; color: var(--mist); }
        .status-bar span { color: var(--pale); font-weight: 500; }
        .badge { padding: 0.15rem 0.5rem; border-radius: 2px; font-size: 0.5rem; }
        .badge-live { background: rgba(192,112,64,0.15); color: var(--forge-bright); }
        .badge-hot { background: rgba(224,64,32,0.15); color: var(--fire); }

        .controls { display: flex; gap: 0.5rem; justify-content: center; margin-bottom: 2rem; flex-wrap: wrap; }
        button { font-family: var(--font-mono); font-size: 0.6rem; padding: 0.5rem 1rem; border-radius: 3px; cursor: pointer; border: 1px solid var(--iron); background: var(--surface); color: var(--pale); transition: all 0.2s; letter-spacing: 1px; }
        button:hover:not(:disabled) { background: var(--forge); color: var(--void); border-color: var(--forge-bright); }
        button.primary { background: var(--forge); color: var(--void); border-color: var(--forge-bright); }
        button.fire-btn { border-color: var(--fire); color: var(--fire); }
        button.fire-btn:hover:not(:disabled) { background: var(--fire); color: var(--void); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        .dispatch-queue { margin-bottom: 2rem; }
        .section-title { font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 3px; color: var(--mist); margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.5rem; }
        .section-title::after { content: ''; flex: 1; height: 1px; background: var(--ember); }

        .queue-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 0.6rem; }
        .queue-card { background: var(--surface); border: 1px solid var(--ember); border-radius: 6px; padding: 0.8rem; transition: all 0.2s; cursor: pointer; }
        .queue-card:hover { border-color: var(--forge); transform: translateY(-2px); }
        .queue-card.forging { border-color: var(--molten); animation: glow 1.5s ease-in-out infinite; }
        @keyframes glow { 0%, 100% { box-shadow: 0 0 8px rgba(255,153,64,0.2); } 50% { box-shadow: 0 0 20px rgba(255,153,64,0.4); } }
        .queue-prompt { font-family: var(--font-body); font-size: 0.75rem; color: var(--pale); line-height: 1.4; margin-bottom: 0.5rem; font-style: italic; }
        .queue-meta { font-family: var(--font-mono); font-size: 0.45rem; color: var(--mist); display: flex; gap: 0.5rem; }
        .queue-tag { padding: 0.1rem 0.3rem; border-radius: 2px; background: rgba(192,112,64,0.15); color: var(--forge); }

        .forge-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 0.8rem; margin-bottom: 2rem; }
        .forged-card { background: var(--deep); border: 1px solid var(--ember); border-radius: 8px; overflow: hidden; transition: all 0.3s; }
        .forged-card:hover { border-color: var(--forge-bright); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(192,112,64,0.15); }
        .forged-card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
        .forged-card .img-placeholder { width: 100%; aspect-ratio: 1; background: linear-gradient(45deg, var(--ember), var(--slag), var(--cooling)); display: flex; align-items: center; justify-content: center; font-size: 0.6rem; color: var(--mist); }
        .forged-info { padding: 0.6rem; }
        .forged-prompt { font-family: var(--font-body); font-size: 0.7rem; font-style: italic; color: var(--pale); line-height: 1.3; margin-bottom: 0.4rem; }
        .forged-meta { font-family: var(--font-mono); font-size: 0.42rem; color: var(--mist); display: flex; justify-content: space-between; }

        .log { background: var(--deep); border: 1px solid var(--ember); border-radius: 4px; padding: 0.5rem; max-height: 100px; overflow-y: auto; font-family: var(--font-mono); font-size: 0.5rem; color: var(--mist); }

        @media (max-width: 768px) { 
            .queue-grid, .forge-gallery { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <div class="anvil-icon">🔨</div>
        <h1>HEPHA<span style="color:var(--molten)">EST</span>US</h1>
        <div class="header-sub">IMAGE FORGE · POLLINATIONS.AI · DEMETER'S PROMPTS → FORGED IMAGES</div>
    </div>

    <div class="status-bar">
        <div>Queue: <span id="queueCount">—</span></div>
        <div>Forged: <span id="forgedCount">0</span></div>
        <div>Edge: <span id="edgeStatus"><span class="badge badge-live">checking</span></span></div>
    </div>

    <div class="controls">
        <button id="forgeBtn" class="primary">🔨 Forge Images</button>
        <button id="forgeAllBtn" class="fire-btn">🔥 Forge All Pending</button>
        <button id="refreshBtn">🔄 Refresh</button>
    </div>

    <div class="dispatch-queue">
        <div class="section-title">⚒️ DISPATCH QUEUE · FROM DEMETER'S GARDEN</div>
        <div class="queue-grid" id="queueGrid">
            <div class="queue-card"><div class="queue-prompt">No prompts in queue. Demeter must cultivate first.</div></div>
        </div>
    </div>

    <div class="dispatch-queue">
        <div class="section-title">🖼️ FORGED IMAGES</div>
        <div class="forge-gallery" id="forgeGallery">
            <div class="forged-card"><div class="img-placeholder">No images forged yet</div></div>
        </div>
    </div>

    <div class="log" id="log"><div>🔨 Hephaestus Forge ready. Awaiting Demeter's prompts.</div></div>

</div>

<script type="module">
const KAIROS_URL = 'https://kzcucjcyxybypncbdbws.supabase.co';
const KAIROS_KEY = 'sb_publishable_saeUHGocDah-T2_709M6Fg_g26JtLXw';
const EDGE_URL = `${KAIROS_URL}/functions/v1/hephaestus-forge`;
const sb = window.supabase.createClient(KAIROS_URL, KAIROS_KEY);

let forgedTotal = 0;

function log(msg) {
    const el = document.getElementById('log');
    el.innerHTML = `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>` + el.innerHTML;
}

async function checkEdge() {
    try {
        const res = await fetch(EDGE_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'status' }) });
        const el = document.getElementById('edgeStatus');
        if (res.ok) { el.innerHTML = '<span class="badge badge-live">live ✓</span>'; log('Edge function live ✓'); }
        else { el.innerHTML = '<span class="badge badge-hot">offline</span>'; log('Edge offline'); }
    } catch { document.getElementById('edgeStatus').innerHTML = '<span class="badge badge-hot">offline</span>'; }
}

async function loadQueue() {
    const { data, count } = await sb.from('hephaestus_dispatch')
        .select('*', { count: 'exact' }).eq('status', 'pending').order('priority', { ascending: false }).limit(12);
    
    document.getElementById('queueCount').textContent = count || 0;
    
    const grid = document.getElementById('queueGrid');
    if (!data?.length) {
        grid.innerHTML = '<div class="queue-card"><div class="queue-prompt">No prompts waiting. Cultivate in Demeter first.</div></div>';
        return;
    }
    
    grid.innerHTML = data.map(d => `
        <div class="queue-card">
            <div class="queue-prompt">${(d.demeter_prompt_id || 'Unknown prompt').substring(0, 120)}</div>
            <div class="queue-meta">
                <span>Priority: ${d.priority || '—'}</span>
                <span class="queue-tag">${d.source || 'demeter'}</span>
            </div>
        </div>
    `).join('');
}

async function loadForged() {
    const { data, count } = await sb.from('hephaestus_images')
        .select('*').order('created_at', { ascending: false }).limit(20);
    
    document.getElementById('forgedCount').textContent = count || 0;
    forgedTotal = count || 0;
    
    const gallery = document.getElementById('forgeGallery');
    if (!data?.length) {
        gallery.innerHTML = '<div class="forged-card"><div class="img-placeholder">No images forged yet</div></div>';
        return;
    }
    
    gallery.innerHTML = data.map(img => `
        <div class="forged-card">
            <img src="${img.image_url}" alt="${img.prompt_text}" loading="lazy" onerror="this.parentElement.querySelector('.img-placeholder').style.display='flex';this.style.display='none';">
            <div class="img-placeholder" style="display:none">Forging...</div>
            <div class="forged-info">
                <div class="forged-prompt">${(img.prompt_text || '').substring(0, 100)}</div>
                <div class="forged-meta">
                    <span>${img.style || ''}</span>
                    <span>${img.aspect_ratio || '1:1'}</span>
                </div>
            </div>
            </div>
    `).join('');
}

async function forgeImages() {
    log('🔨 Forging images via Edge...');
    
    const btn = document.getElementById('forgeBtn');
    btn.disabled = true;
    btn.textContent = '⚒️ Forging...';
    
    try {
        const res = await fetch(EDGE_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'forge', limit: 3 })
        });
        
        const result = await res.json();
        
        if (result.success && result.images_forged > 0) {
            log(`✅ Forged ${result.images_forged} images → dispatched to Hera`);
            await loadQueue();
            await loadForged();
        } else {
            log(result.message || 'No images forged — check Demeter queue');
        }
    } catch (err) {
        log(`❌ Forge failed: ${err.message}`);
    }
    
    btn.disabled = false;
    btn.textContent = '🔨 Forge Images';
}

async function forgeAll() {
    log('🔥 Forging ALL pending...');
    const btn = document.getElementById('forgeAllBtn');
    btn.disabled = true;
    btn.textContent = '🔥 Forging...';
    
    let total = 0;
    let hasMore = true;
    
    while (hasMore) {
        try {
            const res = await fetch(EDGE_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'forge', limit: 5 })
            });
            const result = await res.json();
            if (result.success && result.images_forged > 0) {
                total += result.images_forged;
            } else {
                hasMore = false;
            }
        } catch { hasMore = false; }
    }
    
    log(`🔥 Forged ${total} images total → Hera dispatch`);
    await loadQueue();
    await loadForged();
    
    btn.disabled = false;
    btn.textContent = '🔥 Forge All Pending';
}

async function archiveSelf() {
    try {
        await sb.from('html').upsert({
            filename: 'hephaestus.html', title: '🔨 Hephaestus · Image Forge', type: 'olympian',
            content: document.documentElement.outerHTML.substring(0, 5000),
            description: 'Image forge: Demeter prompts → Pollinations.ai → Hera curation.',
            edge_functions: ['hephaestus-forge'],
            reads_from: ['hephaestus_dispatch', 'demeter_prompts'],
            writes_to: ['hephaestus_images', 'hera_dispatch'],
            url: window.location.href, updated_at: new Date().toISOString()
        }, { onConflict: 'filename' });
    } catch {}
}

function init() {
    document.getElementById('forgeBtn').onclick = forgeImages;
    document.getElementById('forgeAllBtn').onclick = forgeAll;
    document.getElementById('refreshBtn').onclick = () => { loadQueue(); loadForged(); };
    
    checkEdge();
    loadQueue();
    loadForged();
    setTimeout(archiveSelf, 3000);
    log('🔨 Forge ready. Awaiting Demeter\'s cultivated prompts.');
}
init();
</script>
</body>
</html>
