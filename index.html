<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔨 Hephaestus · Pantheon Image Forge</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --void: #08080c; --surface: #1a1820; --forge: #c07040; --forge-bright: #e08850; --spawn: #4ade80; --gold: #c8943a; }
        body { background: var(--void); color: #d4c8c0; font-family: 'JetBrains Mono', monospace; padding: 2rem; }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { color: var(--forge-bright); text-align: center; }
        button { padding: 0.4rem 0.8rem; cursor: pointer; background: var(--surface); color: #d4c8c0; border: 1px solid var(--forge); margin: 0.2rem; }
        button:hover { background: var(--forge); color: #000; }
        button.primary { background: var(--forge); color: #000; }
        .god-section { margin: 1rem 0; padding: 0.8rem; background: var(--surface); border-radius: 6px; }
        .god-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
        .god-name { font-size: 1rem; color: var(--forge-bright); }
        .image-strip { display: flex; gap: 0.4rem; overflow-x: auto; }
        .image-strip img { width: 160px; height: 160px; object-fit: cover; border-radius: 4px; border: 1px solid #333; }
        .image-strip .placeholder { width: 160px; height: 160px; background: #111; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; color: #555; border-radius: 4px; }
        .log { margin-top: 1rem; font-size: 0.7rem; color: #888; }
    </style>
</head>
<body>
<div class="container">
    <h1>🔨 HEPHAESTUS · PANTHEON IMAGE FORGE</h1>
    
    <div style="text-align:center;margin:1rem 0;">
        <button class="primary" onclick="forgeMissing()">🔍 Forge Missing Images</button>
        <button onclick="forgeAll()">🔥 Forge All Gods</button>
        <button onclick="checkMissing()">📋 Check Missing</button>
        <button onclick="refresh()">🔄 Refresh</button>
    </div>

    <div id="godSections"></div>
    <div class="log" id="log">🔨 Forge ready.</div>
</div>

<script type="module">
const EDGE = 'https://kzcucjcyxybypncbdbws.supabase.co/functions/v1/hephaestus-forge';
const sb = window.supabase.createClient(
    'https://kzcucjcyxybypncbdbws.supabase.co',
    'sb_publishable_saeUHGocDah-T2_709M6Fg_g26JtLXw'
);

const GODS = ['hermes', 'aphrodite', 'ares', 'apollo', 'demeter', 'athena', 'hephaestus'];

function log(msg) { document.getElementById('log').innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`; }

async function callEdge(payload) {
    const res = await fetch(EDGE, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    return await res.json();
}

window.forgeMissing = async () => {
    log('🔍 Finding missing images...');
    const check = await callEdge({ action:'missing' });
    if (!check.missing?.length) { log('✅ All images present!'); return; }
    log(`🔨 Forging ${check.missing.length} missing images...`);
    await callEdge({ action:'forge-all' });
    log('✅ Done.');
    window.refresh();
};

window.forgeAll = async () => {
    log('🔥 Forging all god images...');
    const result = await callEdge({ action:'forge-all' });
    for (const [god, r] of Object.entries(result.results || {})) {
        log(`  ${god}: ${r.forged}/${r.total}`);
    }
    window.refresh();
};

window.checkMissing = async () => {
    const check = await callEdge({ action:'missing' });
    if (check.missing?.length) {
        log(`❌ Missing: ${check.missing.join(', ')}`);
    } else {
        log('✅ All images present.');
    }
};

window.refresh = async () => {
    const { data } = await sb.from('images').select('*').order('created_at', { ascending: false });
    const sections = document.getElementById('godSections');
    
    sections.innerHTML = GODS.map(god => {
        const imgs = (data || []).filter(i => i.god === god);
        return `
            <div class="god-section">
                <div class="god-header">
                    <span class="god-name">${getIcon(god)} ${god.toUpperCase()}</span>
                    <button onclick="forgeGod('${god}')">🔨 Forge ${god}</button>
                </div>
                <div class="image-strip">
                    ${getImageTypes().map(type => {
                        const img = imgs.find(i => i.name === `${god}-${type}`);
                        return img 
                            ? `<img src="${img.image_url}" alt="${type}" title="${type}" />`
                            : `<div class="placeholder">${type}</div>`;
                    }).join('')}
                </div>
            </div>
        `;
    }).join('');
};

window.forgeGod = async (god) => {
    log(`🔨 Forging ${god}...`);
    const result = await callEdge({ action:'forge', god });
    log(`✅ ${god}: ${result.forged}/${result.total}`);
    window.refresh();
};

function getIcon(god) {
    const icons = { hermes:'⚡', aphrodite:'💗', ares:'⚔️', apollo:'☀️', demeter:'🌾', athena:'🦉', hephaestus:'🔨' };
    return icons[god] || '🏛️';
}

function getImageTypes() {
    return ['hero', 'classical', 'cyber', 'rune', 'chthonic'];
}

// Also need to update the images table
async function ensureTable() {
    await sb.rpc('create_images_table_if_needed').catch(() => {});
}

ensureTable();
window.refresh();
</script>
</body>
</html>
