<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hephaestus • The Eternal Anvil</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/monokai.min.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="min-h-screen bg-[#0a0502] text-amber-100 overflow-hidden">
  <!-- Background -->
  <div class="fixed inset-0 bg-cover bg-center opacity-10 pointer-events-none" 
       style="background-image: url('assets/images/hephaestus-temple.jpg');"></div>

  <div class="max-w-7xl mx-auto p-8 h-screen flex flex-col">
    <!-- Header -->
    <div class="text-center mb-6">
      <div class="relative inline-block mb-4">
        <img src="assets/images/hephaestus-portrait.jpg" 
             alt="Hephaestus" 
             class="w-40 h-40 object-cover rounded-2xl border-4 border-orange-700">
        <div class="absolute -bottom-2 -right-2 text-5xl">🔨</div>
      </div>
      <h1 class="text-5xl font-bold tracking-widest text-orange-400">HEPHAESTUS</h1>
      <p class="text-orange-300">God of the Forge • Master Craftsman</p>
    </div>

    <div class="flex-1 flex gap-6">
      <!-- LEFT: Ritual / Chat -->
      <div class="w-5/12 flex flex-col border border-orange-900 bg-black/80 rounded-3xl p-6">
        <div class="mb-4">
          <div class="text-xs uppercase tracking-widest text-orange-500 mb-3">ACTIVE SCHEMATICS</div>
          <div id="active-schematics" class="flex flex-wrap gap-3"></div>
        </div>

        <div class="flex-1 flex flex-col">
          <div class="text-sm text-orange-400 mb-3 flex items-center gap-2">
            <div class="w-2 h-2 bg-orange-500 rounded-full animate-pulse"></div>
            FORGE RITUAL
          </div>
          <div id="chat" class="flex-1 overflow-y-auto space-y-6 pr-4 custom-scroll"></div>
        </div>

        <div class="flex gap-3 mt-4">
          <input id="user-input" 
                 class="flex-1 bg-zinc-950 border border-orange-800 focus:border-orange-500 rounded-2xl px-5 py-4 outline-none"
                 placeholder="Speak your need...">
          <button onclick="forgeRequest()" 
                  class="bg-orange-600 hover:bg-orange-500 px-8 rounded-2xl font-bold">HAMMER</button>
        </div>
      </div>

      <!-- RIGHT: CODE FORGE CANVAS -->
      <div class="flex-1 flex flex-col border border-orange-900 bg-black/80 rounded-3xl overflow-hidden">
        <div class="bg-black/90 border-b border-orange-900 px-6 py-3 flex items-center justify-between">
          <div class="text-sm text-orange-400 flex items-center gap-3">
            <span>🔨</span> CODE FORGE CANVAS
          </div>
          <div class="flex gap-3">
            <button onclick="clearCanvas()" 
                    class="text-xs px-4 py-1 border border-orange-800 hover:border-orange-500 rounded-lg">CLEAR</button>
            <button onclick="copyCode()" 
                    class="text-xs px-4 py-1 bg-orange-600 hover:bg-orange-500 rounded-lg">COPY CODE</button>
          </div>
        </div>
        <textarea id="code-editor"></textarea>
      </div>
    </div>

    <div class="text-center text-xs text-orange-700 mt-4">
      "I do not dream. I forge." — Hephaestus
    </div>
  </div>

  <script src="assets/js/schematics.js"></script>
  <script src="assets/js/core.js"></script>
</body>
</html>
